global_config:
  max_concurrent_processing: 10
  event_batch_size: 100
  log_level: "INFO"

chains:
  bsc_testnet:
    enabled: true
    chain_type: "bsc"
    confirmation_blocks: 3
    polling_interval: 10000
    start_block: 92582135
    rpc:
      urls:
        - "https://rpc.sentio.xyz/bsc-testnet"
      timeout: 30
      retries: 3
      rate_limit:
        requests_per_second: 1
        burst_size: 1
    contracts:
      - name: "WBTC"
        address: "0xdF999D14C32655235A6606E41c7A77E627F23bcd"
        abi_path: "examples/bsc_testnet_wbtc_mint_burn_listener/wbtc_mint_burn_abi.json"
        events: ["Mint", "Burn"]
      - name: "WBTCFactory"
        address: "0xb17882f05C69308dEb2A41B567d5234Dc042E674"
        abi_path: "examples/bsc_testnet_wbtc_mint_burn_listener/wbtc_factory_mint_events_abi.json"
        events: ["MintRequestAdd", "MintConfirmed", "MintRejected"]
