# Chain Listener SDK Configuration Example
# This file demonstrates how to configure multi-chain blockchain monitoring

version: "1.0"

# Global configuration settings
global_config:
  max_concurrent_processing: 10
  event_batch_size: 100
  callback_error_handling: "ignore"  # ignore, retry, stop
  log_level: "INFO"

# Storage configuration for state persistence
storage:
  backend: "redis"
  key_prefix: "chain_listener:"
  # redis_client: Will be injected programmatically

# Blockchain configurations
chains:
  # Ethereum Mainnet
  ethereum:
    enabled: true
    confirmation_blocks: 12
    polling_interval: 15000  # 15 seconds
    rpc_urls:
      - url: "https://eth.llamarpc.com"
        priority: 1
      - url: "https://mainnet.infura.io/v3/YOUR_PROJECT_ID"
        priority: 2
      - url: "https://eth-mainnet.alchemyapi.io/v2/YOUR_API_KEY"
        priority: 3
    contracts:
      - name: "WBTC"
        address: "0x2260FAC5E5542a773Aa44fBCfeDf7C193bc2C599"
        events: ["Transfer", "Approval", "Burn"]
      - name: "USDC"
        address: "0xA0b86a33E6441e1cA48558572A901D6885543326"
        events: ["Transfer", "Approval"]

  # Ethereum Goerli Testnet (for development)
  ethereum_testnet:
    enabled: false  # Disabled by default
    chain_type: "ethereum"
    chain_id: 5
    confirmation_blocks: 5  # Lower for testnet
    polling_interval: 5000  # 5 seconds
    rpc_urls:
      - url: "https://eth-goerli.alchemyapi.io/v2/YOUR_API_KEY"
        priority: 1
    contracts:
      - name: "TestERC20"
        address: "0x07865c6E87B9F70255377e024ace6630C1Eaa37F"
        events: ["Transfer"]